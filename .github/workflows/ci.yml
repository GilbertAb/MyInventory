name: CI

on:
  pull_request:
    branches:
      - develop

jobs:
  build-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Backend/APIs/External.MyInventoryApi/External.MyInventoryApi.sln
      
      - name: Build
        run: dotnet build Backend/APIs/External.MyInventoryApi/External.MyInventoryApi.sln --configuration Release --no-restore
      
      - name: Run tests with coverage
        run: dotnet test Backend/APIs/External.MyInventoryApi/External.MyInventoryApi.sln --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"

      - name: Install reportgenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: reportgenerator -reports:"**/coverage.cobertura.xml" -targetdir:"Backend/APIs/External.MyInventoryApi/coveragereport" -classfilters:"-External.MyInventoryApi.DataAccess.SqlServer.SqlServerDatabase"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: Backend/APIs/External.MyInventoryApi/coveragereport

      - name: Build Docker image
        working-directory: Backend/APIs/External.MyInventoryApi
        run: docker build -t myinventory-api .